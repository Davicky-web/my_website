<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Simple Site</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo">Simple Site</h1>
      <nav class="nav" id="nav">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>
      <div class="header-actions">
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
        <button id="menuToggle" class="menu-toggle" aria-label="Toggle menu">☰</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="home" class="hero">
      <h2>Welcome</h2>
      <p>This is a small, static website example to get you started.</p>
      <p><a class="cta" href="#contact">Get in touch</a></p>
    </section>

    <section id="about" class="card">
      <h3>About</h3>
      <p>Build pages using HTML for structure, CSS for styling, and JavaScript for behavior.</p>
    </section>

    <section id="contact" class="card">
      <h3>Contact</h3>
      <form id="contactForm">
        <label>Name<br><input type="text" name="name" required></label>
        <label>Email<br><input type="email" name="email" required></label>
        <label>Message<br><textarea name="message" rows="4" required></textarea></label>
        <button type="submit">Send</button>
      </form>
      <p id="formStatus" class="muted" aria-live="polite"></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© <span id="year"></span> Simple Site</div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
